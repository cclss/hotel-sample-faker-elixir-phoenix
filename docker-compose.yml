services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fakr_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/fakr_prod
      SECRET_KEY_BASE: ioRzt0wK3quyLYHXOFXC88X895XkWmiwn/VVguje98XsddQQKaAcr1+GQwopulsz
      PHX_HOST: localhost
      PHX_SCHEME: http
      PHX_URL_PORT: "4000"
      PORT: "4000"
      MAIL_ADAPTER: local
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
